<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Задание №3</title>
	<!-- Привязка внешней таблицы стилей CSS -->
	<link rel="stylesheet" type="text/css" href="css/style3.css">
</head>
<body >
	<!-- Форма -->
	<form>
		<!-- Группировка элементов-->
		<fieldset>
			<legend>Main information</legend>

			<!-- Для надписей -->
			<div class="labels">
				<label>Name<span>*</span></label>
				<label>Surname<span>*</span></label>
				<label>Birthday date<span>*</span></label>
				<label><span>*</span><input type="checkbox" name="iam"> I am 18+</label>
			</div>

			<!-- Поля ввода -->
			<div class="inputs">
				<input type="text" name="Name" required size="25">
				<input type="text" name="Surname" required>
				<input type="date" name="Birthdaydate" required>
			</div>
		
		</fieldset>
		<fieldset>
			<legend>Contacts</legend>
				<!-- Для надписей -->
			<div class="labels">
				<label>Telephone number</label>
				<label>E-mail</label>
				<label>Social Net URL</label>
			</div>

			<!-- Поля ввода -->
			<div class="inputs">
				<input type="tel" name="phone" placeholder="+7">
				<input type="email" name="mail" placeholder="test@example.com" size="25">
				<input type="url" name="neturl" placeholder="http://" size="25">
			</div>
		</fieldset>
		<fieldset>
			<legend>About</legend>
			<div class="labels">
				<label>Photo</label>
				<label>About me</label>				
			</div>
			<!-- Поля ввода -->
			<div class="inputs">
				<input type="file" name="photo">
				<textarea name="about" cols="35" rows="5"></textarea>
			</div>
		</fieldset>

		<!-- Кнопки -->
		<input type="submit" name="Submit" value="Submit">
		<input type="reset" name="Reset" value="reset">
	</form>
</body>
</html>
