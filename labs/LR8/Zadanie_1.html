<body >
	<script type="text/javascript">
		
		function ZapolnArr(){
			//Создадим пустой массив
			var arr = [];
			while (true){
				//Считаем значение из prompt
				var value = prompt('Введите значение: ','5');
				if (value === null){
					break;
				}
				//добавляем значение в массив
				arr[arr.length]= value;
			}
			alert("Заполненый массив: " + arr);
		}
	</script>
	
	<h1>Массив</h1>
	<button onclick="ZapolnArr()">Заполн массив</button>
</body>
</html>
