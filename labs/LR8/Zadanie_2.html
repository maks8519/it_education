<body >
	<script type="text/javascript">
		
		function okSwitch(){
			//Считаем значение из prompt
			var value = prompt('Введите значение: ','1');
			
			switch(value){
				case '6':
				case '7':
				case '8':
				case '10':
					alert('Близко');
					break;
				case '9':
					alert('Верно');
					break;
			default:
				alert("Неверно");
				break;
			}
		}	
	</script>
	
	<h1>Конструкция switch</h1>
	<button onclick="okSwitch()">Запуск</button>
</body>
</html>
