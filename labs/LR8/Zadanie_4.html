<body >
	<script type="text/javascript">
		
		function inNumber(){
			//пустой массив
			var arr = [];
			//Считаем значение из prompt
			value = prompt('Введите значение: ','3');
			//проверка отрицательное число?
			if (value < 0) {
        		value =  value * -1;
      		}
			//Цикл запроса новых чисел
			for (var i =0 ; i < value; i++){
				var num = prompt("Введите число №" + (i + 1) + ":",'5');
				//заносим числа в массив.
				arr[arr.length] = num;
			}


  			// Создаём новый массив для нечётных чисел
      		var nechet = [];

      // Проверяем каждый элемент на нечётность
      for (let i = 0; i < arr.length; i++) {
        if (arr[i] % 2 !== 0) {
          nechet[nechet.length] = arr[i];
        }
      }

			alert(nechet);
		}	

	</script>
	
	<h1>Массив с нечетными цифрами</h1>
	<button onclick="inNumber()">Запуск</button>
</body>
</html>
